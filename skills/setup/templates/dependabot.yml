# Adapt: add one entry per detected package ecosystem
# Supported: npm, pip, gomod, cargo, github-actions
version: 2
updates:
  - package-ecosystem: npm  # REPLACE with detected ecosystem
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Always include: keeps your GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
