name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]" || pip install -r requirements-dev.txt || pip install ruff pyright pytest pytest-cov
      - run: ruff check .
      - run: ruff format --check .
      - run: pyright
      - run: pytest
